<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Stride Fitness Tracker - Track your journey.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Stride Fitness">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Stride Fitness</title>
  <link rel="manifest" href="manifest.json">
  <meta name="google-signin-client_id" content="596014931235-jh17bl9lnk6e0s76ksmm9si32m0ohvcq.apps.googleusercontent.com">

  <style>
    body {
      background-color: #0F111A;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid #FFF;
      border-bottom-color: #3D5AFE;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .brand {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="brand">STRIDE</div>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
